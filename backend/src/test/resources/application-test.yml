spring:
  datasource:
    url: jdbc:h2:mem:hedge_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
  security:
    user:
      name: test
      password: test

logging:
  level:
    com.hedge.prototype: WARN
    org.hibernate.SQL: WARN
