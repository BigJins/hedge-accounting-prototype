server:
  port: 8090

spring:
  application:
    name: hedge-prototype
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hedge}
    username: ${DB_USERNAME:hedge}
    password: ${DB_PASSWORD:hedge}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.hedge.prototype: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
