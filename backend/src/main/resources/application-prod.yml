server:
  port: ${PORT:8090}

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.hedge.prototype: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:*}
